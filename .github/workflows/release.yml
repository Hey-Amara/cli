name: Release on version bump

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Read version from pyproject.toml
        id: ver
        env:
          BASE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          version=$(grep -E '^version[[:space:]]*=' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/' || true)
          if [ -z "$version" ]; then
            echo "Could not parse version from pyproject.toml" >&2
            exit 1
          fi
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.+-]+)?$'; then
            echo "Rejecting non-semver version: $version" >&2
            exit 1
          fi

          version_changed=true
          if [ -n "${BASE_SHA:-}" ] && ! echo "$BASE_SHA" | grep -Eq '^0+$'; then
            previous_version=$(
              git show "${BASE_SHA}:pyproject.toml" 2>/dev/null \
                | grep -E '^version[[:space:]]*=' \
                | head -1 \
                | sed -E 's/.*"([^"]+)".*/\1/' \
                || true
            )
            if [ -n "$previous_version" ] && [ "$previous_version" = "$version" ]; then
              echo "Version remains ${version}; skipping release reconciliation."
              version_changed=false
            fi
          fi

          {
            echo "version=$version"
            echo "tag=v$version"
            echo "version_changed=$version_changed"
          } >> "$GITHUB_OUTPUT"

      - name: Check tag and GitHub release state
        if: steps.ver.outputs.version_changed == 'true'
        id: state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          askpass=$(mktemp "${RUNNER_TEMP:-/tmp}/git-askpass.XXXXXX")
          release_response=$(mktemp "${RUNNER_TEMP:-/tmp}/gh-release-view.XXXXXX")
          release_error=$(mktemp "${RUNNER_TEMP:-/tmp}/gh-release-view.XXXXXX")
          cleanup() {
            rm -f "${askpass}" "${release_response}" "${release_error}"
          }
          trap cleanup EXIT
          cat > "${askpass}" <<'EOF_ASKPASS'
          #!/usr/bin/env bash
          case "$1" in
            Username*) printf '%s\n' 'x-access-token' ;;
            Password*) printf '%s\n' "${GH_TOKEN}" ;;
            *) printf '\n' ;;
          esac
          EOF_ASKPASS
          chmod 700 "${askpass}"

          GIT_ASKPASS="${askpass}" GIT_TERMINAL_PROMPT=0 git fetch --force --tags origin

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists."
            tag_commit=$(git rev-list -n 1 "${TAG}")
            if [ "${tag_commit}" != "${GITHUB_SHA}" ]; then
              echo "Tag ${TAG} points to ${tag_commit}, not triggering commit ${GITHUB_SHA}." >&2
              exit 1
            fi
            tag_exists=true
          else
            echo "Tag ${TAG} does not exist yet."
            tag_exists=false
          fi

          if gh api --include --silent \
            "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" \
            >"${release_response}" 2>"${release_error}"; then
            echo "GitHub release ${TAG} already exists."
            release_exists=true
          else
            http_status=$(awk 'toupper($1) ~ /^HTTP/ { status=$2 } END { print status }' "${release_response}")
            if [ "$http_status" = "404" ]; then
              echo "GitHub release ${TAG} does not exist yet."
              release_exists=false
            else
              echo "Could not determine GitHub release state for ${TAG}:" >&2
              cat "${release_error}" >&2
              exit 1
            fi
          fi

          {
            echo "tag_exists=$tag_exists"
            echo "release_exists=$release_exists"
          } >> "$GITHUB_OUTPUT"

      - name: Create and push missing release tag
        if: steps.ver.outputs.version_changed == 'true' && steps.state.outputs.tag_exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" "${GITHUB_SHA}" -m "Release ${TAG}"

          askpass=$(mktemp "${RUNNER_TEMP:-/tmp}/git-askpass.XXXXXX")
          trap 'rm -f "${askpass}"' EXIT
          cat > "${askpass}" <<'EOF_ASKPASS'
          #!/usr/bin/env bash
          case "$1" in
            Username*) printf '%s\n' 'x-access-token' ;;
            Password*) printf '%s\n' "${GH_TOKEN}" ;;
            *) printf '\n' ;;
          esac
          EOF_ASKPASS
          chmod 700 "${askpass}"
          GIT_ASKPASS="${askpass}" GIT_TERMINAL_PROMPT=0 git push origin "refs/tags/${TAG}"

      - name: Create missing GitHub release
        if: steps.ver.outputs.version_changed == 'true' && steps.state.outputs.release_exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${TAG}" \
            --generate-notes \
            --verify-tag
